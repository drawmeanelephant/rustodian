name: Security Audit

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6 AM UTC
  push:
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'

jobs:
  audit:
    name: Audit Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/audit@v1
